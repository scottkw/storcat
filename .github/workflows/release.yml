name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build macOS universal
        run: wails build -clean -platform darwin/universal

      - name: Verify universal binary
        run: lipo -info build/bin/StorCat.app/Contents/MacOS/StorCat

      - name: Import Apple certificate
        uses: apple-actions/import-codesign-certs@b610f78488812c1e56b20e6df63ec42d833f2d14  # v6.0.0
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Sign .app bundle
        env:
          APPLE_CERT_NAME: ${{ secrets.APPLE_CERTIFICATE_NAME }}
        run: |
          /usr/bin/codesign \
            --sign "$APPLE_CERT_NAME" \
            --options runtime \
            --entitlements build/darwin/entitlements.plist \
            --force \
            --timestamp \
            --verbose \
            build/bin/StorCat.app

      - name: Verify code signature
        run: codesign --verify --verbose build/bin/StorCat.app

      - name: Create macOS tarball
        run: cd build/bin && tar czf StorCat-${{ steps.version.outputs.VERSION }}-darwin-universal.tar.gz StorCat.app

      - name: Create macOS DMG
        run: |
          cd build/bin
          hdiutil create \
            -volname "StorCat" \
            -srcfolder StorCat.app \
            -ov \
            -format UDZO \
            "StorCat-${{ steps.version.outputs.VERSION }}-darwin-universal.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID_EMAIL: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "notarytool-profile" \
            --apple-id "$APPLE_ID_EMAIL" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD"

          xcrun notarytool submit \
            "build/bin/StorCat-${{ steps.version.outputs.VERSION }}-darwin-universal.dmg" \
            --keychain-profile "notarytool-profile" \
            --wait \
            | tee /tmp/notary-output.log

          grep -q "status: Accepted" /tmp/notary-output.log || {
            echo "::error::Notarization failed"
            SUBMISSION_ID=$(grep "  id: " /tmp/notary-output.log | head -1 | awk '{print $2}')
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" --keychain-profile "notarytool-profile"
            fi
            exit 1
          }

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple \
            "build/bin/StorCat-${{ steps.version.outputs.VERSION }}-darwin-universal.dmg"

      - name: Verify Gatekeeper acceptance
        run: spctl --assess --type exec build/bin/StorCat.app || exit 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: StorCat-darwin-universal
          path: |
            build/bin/StorCat-*-darwin-universal.tar.gz
            build/bin/StorCat-*-darwin-universal.dmg
          retention-days: 1


  build-windows:
    runs-on: windows-2022
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install NSIS EnVar plugin
        shell: bash
        run: cp build/windows/installer/Plugins/x86-unicode/EnVar.dll "/c/Program Files (x86)/NSIS/Plugins/x86-unicode/"

      - name: Build Windows with NSIS installer
        run: wails build -clean -platform windows/amd64 -windowsconsole -nsis

      - name: Sign portable exe
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b  # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: build\bin\StorCat.exe
          malware_block: false
          override: true

      - name: Sign NSIS installer
        uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b  # v1.3.2
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: build\bin\StorCat-amd64-installer.exe
          malware_block: false
          override: true

      - name: Verify Authenticode signatures
        shell: cmd
        run: |
          signtool verify /pa /v build\bin\StorCat.exe
          signtool verify /pa /v build\bin\StorCat-amd64-installer.exe

      - name: Rename Windows binary
        shell: bash
        run: mv build/bin/StorCat.exe build/bin/StorCat-${{ steps.version.outputs.VERSION }}-windows-amd64.exe

      - name: Rename NSIS installer
        shell: bash
        run: mv build/bin/StorCat-amd64-installer.exe build/bin/StorCat-${{ steps.version.outputs.VERSION }}-windows-amd64-installer.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: StorCat-windows-amd64
          path: |
            build/bin/StorCat-*-windows-amd64.exe
            build/bin/StorCat-*-windows-amd64-installer.exe
          retention-days: 1

  build-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Linux amd64
        run: wails build -clean -platform linux/amd64

      - name: Create Linux amd64 tarball
        run: cd build/bin && tar czf StorCat-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz StorCat

      - name: Install AppImage tools
        run: |
          sudo apt-get install -y libfuse2
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-appimage https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-gtk.sh https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-appimage linuxdeploy-plugin-gtk.sh

      - name: Create AppImage
        run: |
          export ARCH=x86_64
          export OUTPUT=StorCat-x86_64.AppImage
          ./linuxdeploy \
            --appdir AppDir \
            --executable build/bin/StorCat \
            --icon-file build/appicon.png \
            --desktop-file build/linux/storcat.desktop \
            --plugin gtk \
            --output appimage
          mv StorCat-x86_64.AppImage \
            build/bin/StorCat-${{ steps.version.outputs.VERSION }}-linux-x86_64.AppImage

      - name: Create .deb package
        run: |
          ARCH=$(dpkg --print-architecture)
          VERSION_CLEAN="${{ steps.version.outputs.VERSION }}"
          VERSION_CLEAN="${VERSION_CLEAN#v}"
          PKG_DIR="deb-pkg"
          mkdir -p "$PKG_DIR/DEBIAN" "$PKG_DIR/usr/bin" \
                   "$PKG_DIR/usr/share/applications" "$PKG_DIR/usr/share/pixmaps"
          cp build/bin/StorCat "$PKG_DIR/usr/bin/StorCat"
          cp build/linux/storcat.desktop "$PKG_DIR/usr/share/applications/storcat.desktop"
          cp build/appicon.png "$PKG_DIR/usr/share/pixmaps/storcat.png"
          chmod 755 "$PKG_DIR/usr/bin/StorCat"
          printf 'Package: storcat\nVersion: %s\nArchitecture: %s\nMaintainer: Ken Scott <kenscott@gmail.com>\nDescription: Storage Media Cataloging Tool\n StorCat creates, browses, and searches directory catalogs.\n Generates JSON and HTML representations of directory trees.\nDepends: libgtk-3-0, libwebkit2gtk-4.0-37\nSection: utils\nPriority: optional\n' \
            "$VERSION_CLEAN" "$ARCH" > "$PKG_DIR/DEBIAN/control"
          dpkg-deb --root-owner-group --build "$PKG_DIR" \
            "build/bin/storcat_${VERSION_CLEAN}_${ARCH}.deb"

      - name: Upload Linux amd64 artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: StorCat-linux-amd64
          path: |
            build/bin/StorCat-*-linux-amd64.tar.gz
            build/bin/StorCat-*-linux-x86_64.AppImage
            build/bin/storcat_*_amd64.deb
          retention-days: 1

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.2

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Linux arm64
        run: wails build -clean -platform linux/arm64

      - name: Create Linux arm64 tarball
        run: cd build/bin && tar czf StorCat-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz StorCat

      - name: Create .deb package
        run: |
          ARCH=$(dpkg --print-architecture)
          VERSION_CLEAN="${{ steps.version.outputs.VERSION }}"
          VERSION_CLEAN="${VERSION_CLEAN#v}"
          PKG_DIR="deb-pkg"
          mkdir -p "$PKG_DIR/DEBIAN" "$PKG_DIR/usr/bin" \
                   "$PKG_DIR/usr/share/applications" "$PKG_DIR/usr/share/pixmaps"
          cp build/bin/StorCat "$PKG_DIR/usr/bin/StorCat"
          cp build/linux/storcat.desktop "$PKG_DIR/usr/share/applications/storcat.desktop"
          cp build/appicon.png "$PKG_DIR/usr/share/pixmaps/storcat.png"
          chmod 755 "$PKG_DIR/usr/bin/StorCat"
          printf 'Package: storcat\nVersion: %s\nArchitecture: %s\nMaintainer: Ken Scott <kenscott@gmail.com>\nDescription: Storage Media Cataloging Tool\n StorCat creates, browses, and searches directory catalogs.\n Generates JSON and HTML representations of directory trees.\nDepends: libgtk-3-0, libwebkit2gtk-4.0-37\nSection: utils\nPriority: optional\n' \
            "$VERSION_CLEAN" "$ARCH" > "$PKG_DIR/DEBIAN/control"
          dpkg-deb --root-owner-group --build "$PKG_DIR" \
            "build/bin/storcat_${VERSION_CLEAN}_${ARCH}.deb"

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: StorCat-linux-arm64
          path: |
            build/bin/StorCat-*-linux-arm64.tar.gz
            build/bin/storcat_*_arm64.deb
          retention-days: 1

  release:
    needs: [build-macos, build-windows, build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          path: artifacts/

      - name: List artifacts
        run: ls -laR artifacts/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload artifacts and publish release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          draft: false
          files: artifacts/**/*
